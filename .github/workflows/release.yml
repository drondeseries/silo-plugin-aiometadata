name: Publish plugin release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Validate catalog version
        id: version
        shell: bash
        run: |
          version="$(jq -r '.version' manifest.json)"
          catalog_version="$(jq -r '.plugins[0].manifest.version' repository.json)"
          test "$version" = "$catalog_version"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=v$version" >> "$GITHUB_OUTPUT"

      - name: Check for existing release
        id: existing
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Test and build
        run: |
          go test ./...
          go vet ./...
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -trimpath -o plugin-linux-amd64 ./cmd
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -trimpath -o plugin-linux-arm64 ./cmd
          sha256sum plugin-linux-amd64 plugin-linux-arm64 > checksums.txt

      - name: Verify catalog asset names
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          jq -e --arg version "$VERSION" '
            .plugins[0].checksums_url | endswith("/v" + $version + "/checksums.txt")
          ' repository.json
          jq -e --arg version "$VERSION" '
            .plugins[0].binaries["linux/amd64"].url | endswith("/v" + $version + "/plugin-linux-amd64")
          ' repository.json
          jq -e --arg version "$VERSION" '
            .plugins[0].binaries["linux/arm64"].url | endswith("/v" + $version + "/plugin-linux-arm64")
          ' repository.json

      - name: Publish GitHub release
        if: steps.existing.outputs.exists != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          gh release create "$TAG" plugin-linux-amd64 plugin-linux-arm64 checksums.txt \
            --target "$GITHUB_SHA" \
            --title "AIOMetadata Provider $TAG" \
            --generate-notes
